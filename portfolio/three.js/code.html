<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_18 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_18" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_18');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_18');
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 2000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // 1. GALAXY BACKGROUND (Tier 4 Particles)
  const particlesCount = 8000;
  const posArray = new Float32Array(particlesCount * 3);
  for (let i = 0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 100;
  }
  const particlesGeometry = new THREE.BufferGeometry();
  particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  const particlesMaterial = new THREE.PointsMaterial({
    size: 0.015,
    color: 0x8b5cf6, // Brand Purple
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending
  });
  const starField = new THREE.Points(particlesGeometry, particlesMaterial);
  scene.add(starField);

  // 2. CREATIVE WORLDS (Grouped Hierarchies)
  const universe = new THREE.Group();
  scene.add(universe);

  // WORLD 1: VIDEO EDITING (Geometric abstraction)
  const videoWorld = new THREE.Group();
  videoWorld.position.set(0, 0, -50);
  for(let i=0; i<12; i++) {
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 4.5),
      new THREE.MeshPhongMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.2, side: THREE.DoubleSide, wireframe: i%2===0 })
    );
    mesh.position.set(Math.random()*40-20, Math.random()*20-10, Math.random()*20-10);
    mesh.rotation.y = Math.random() * Math.PI;
    videoWorld.add(mesh);
  }
  universe.add(videoWorld);

  // WORLD 2: AI LAB (Neural core)
  const aiWorld = new THREE.Group();
  aiWorld.position.set(0, -60, -150);
  const core = new THREE.Mesh(
    new THREE.IcosahedronGeometry(10, 2),
    new THREE.MeshPhongMaterial({ color: 0x8b5cf6, wireframe: true })
  );
  aiWorld.add(core);
  universe.add(aiWorld);

  // 3. LIGHTING
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0x8b5cf6, 2, 500);
  pointLight.position.set(50, 50, 50);
  scene.add(pointLight);

  camera.position.z = 20;

  // 4. MOUSE & SCROLL TRACKING
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) - 0.5;
    mouseY = (e.clientY / window.innerHeight) - 0.5;
  });

  let scrollY = 0;
  window.addEventListener('scroll', () => {
    scrollY = window.scrollY;
  });

  function animate() {
    requestAnimationFrame(animate);
    
    // Smooth cinematic camera
    const targetZ = 20 - scrollY * 0.1;
    camera.position.z += (targetZ - camera.position.z) * 0.05;
    camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
    camera.position.y += (-mouseY * 5 - camera.position.y) * 0.05;
    camera.lookAt(new THREE.Vector3(0, -scrollY * 0.1, -scrollY * 0.2));

    starField.rotation.y += 0.0005;
    core.rotation.y += 0.01;
    
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_18 -->
</body>
</html>
